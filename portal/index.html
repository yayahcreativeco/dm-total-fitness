<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Member Login | DM Total Fitness</title>
  <meta name="description" content="DM Total Fitness member portal login." />
  <link rel="icon" type="image/png" href="../assets/img/logo.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Oswald:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../assets/css/style.css" />
</head>
<body class="portal-body">

  <div class="login-wrap">
    <div class="login-card">
      <img class="logo" src="../assets/img/logo.png" alt="DM Total Fitness" />
      <h1>Member Login</h1>
      <p class="sub">Welcome back. Sign in to see your progress.</p>

      <form onsubmit="event.preventDefault(); window.location.href='dashboard.html';">
        <div class="form-field">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" placeholder="you@email.com" value="member@dmtotalfitness.com" />
        </div>
        <div class="form-field">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" placeholder="••••••••" value="demo" />
        </div>
        <button type="submit" class="btn btn-primary btn-block">Log In</button>
      </form>

      <p class="demo-note">Demo preview — any credentials will work. "Log In" opens a sample member dashboard.</p>
      <p class="back"><a href="../index.html">← Back to main site</a></p>
    </div>
  </div>

</body>
</html>
